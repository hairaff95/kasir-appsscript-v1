<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>LanggengMakmur Cashier — Pencatatan Kas Warung</title>
  <meta name="description"
    content="Aplikasi kasir dan pencatatan keuangan harian untuk warung sembako. Catat pemasukan, pengeluaran, dan kasbon pelanggan.">
  <meta name="theme-color" content="#104af0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kasir Mini">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/app.css">
</head>

<body>


  <!-- App Shell -->
  <div id="app-shell">

    <!-- Sidebar (Desktop) -->
    <aside id="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
        </div>
        <div>
          <div class="sidebar-logo-text">LanggengMakmur</div>
          <div id="demo-badge" class="badge badge-orange" style="font-size:10px;margin-top:2px;display:none">DEMO</div>
        </div>
      </div>

      <!-- Search bar placeholder -->
      <div style="padding:12px 14px">
        <div
          style="display:flex;align-items:center;gap:8px;background:var(--gray-50);border:1.5px solid var(--gray-150);border-radius:10px;padding:8px 12px;cursor:default">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--gray-400)" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <span style="font-size:13px;color:var(--gray-400);font-weight:500">Cari menu...</span>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-label">Menu Utama</div>
        <div id="sidebar-nav"></div>
      </div>

      <div style="margin-top:auto;padding:12px 10px 20px;border-top:1px solid var(--gray-100)">
        <button id="sidebar-reset" class="sidebar-nav-btn" style="color:var(--gray-400);font-size:12.5px"
          onclick="App.confirm('Reset semua data demo ke awal?', ()=>{ MockDB.resetDemo(); App.navigate(App.currentPage); Toast.success('Data demo direset'); })">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 109-9 9.75 9.75 0 00-6.74 2.74L3 8" />
            <path d="M3 3v5h5" />
          </svg>
          Reset Data Demo
        </button>
      </div>
    </aside>

    <!-- Main Area -->
    <main id="main-area">
      <div id="page-wrapper">
        <!-- Page rendered here by router -->
        <div id="page-container">
          <!-- Initial skeleton -->
          <div style="padding:20px;display:flex;flex-direction:column;gap:12px">
            <div class="skeleton" style="height:60px;border-radius:0;margin:-20px -20px 0"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
              <div class="skeleton" style="height:90px;border-radius:14px"></div>
              <div class="skeleton" style="height:90px;border-radius:14px"></div>
              <div class="skeleton" style="height:90px;border-radius:14px"></div>
              <div class="skeleton" style="height:90px;border-radius:14px"></div>
            </div>
            <div class="skeleton" style="height:56px;border-radius:14px"></div>
            <div class="skeleton" style="height:56px;border-radius:14px"></div>
            <div class="skeleton" style="height:56px;border-radius:14px"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bottom Nav (Mobile) -->
    <nav id="bottom-nav" aria-label="Navigasi utama">
      <!-- Populated by app.js -->
    </nav>

  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p style="font-size:12px;color:var(--gray-400);font-weight:600;font-family:'Outfit',sans-serif">Memproses...</p>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" aria-live="polite" role="status"></div>

  <!-- Scripts — ORDER MATTERS -->
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/income.js"></script>
  <script src="js/pages/expense.js"></script>
  <script src="js/pages/debt.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/report.js"></script>
  <script src="js/pages/account.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Show demo badge after app inits
    document.addEventListener('DOMContentLoaded', () => {
      const badge = document.getElementById('demo-badge');
      if (badge && window.DEMO_MODE) badge.style.display = 'inline-flex';
    });
  </script>

</body>

</html>
